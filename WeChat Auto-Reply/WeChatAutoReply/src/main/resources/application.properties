################ Knife4j ################
knife4j.enable=true
knife4j.setting.language=zh-CN

################ Swagger UI ################
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

################ OpenAPI Docs ################
springdoc.api-docs.path=/v3/api-docs

################ 分组配置 ################
springdoc.group-configs[0].group=default
springdoc.group-configs[0].paths-to-match=/**
springdoc.group-configs[0].packages-to-scan=ai.langchain4j.controller

################ ollama ################
ollama.chat-model.base-url=http://localhost:11434
ollama.chat-model.model-name=deepseek-r1:1.5b
ollama.chat-model.temperature=0.5
ollama.chat-model.timeout=PT60s
ollama.chat-model.log-requests=false
ollama.chat-model.log-responses=false

